name: Build, Push Docker Image and Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up image tags
        run: |
          echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-hola-mundo:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/devops-hola-mundo:${{ env.SHA_SHORT }} \
                       -t ${{ secrets.DOCKER_USERNAME }}/devops-hola-mundo:${{ env.DATE }} .

      - name: Push Docker image tags
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-hola-mundo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-hola-mundo:${{ env.SHA_SHORT }}
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-hola-mundo:${{ env.DATE }}

      - name: Trigger Render Deploy
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"